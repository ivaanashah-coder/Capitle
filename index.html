<!DOCTYPE html>
<html>
<head>
  <title>Geo Hunt Game</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    #map {
      width: min(100%, 900px);
      height: 500px;
      margin: 20px auto;
      border: 2px solid white;
      position: relative;
      background-color: #1e3a5f;
    }

    .quadLabel {
      position: absolute;
      font-size: 16px;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 0 0 6px rgba(0, 0, 0, 0.8);
    }

    .quadLabel.nw { top: 16px; left: 16px; }
    .quadLabel.ne { top: 16px; right: 16px; }
    .quadLabel.sw { bottom: 16px; left: 16px; }
    .quadLabel.se { bottom: 16px; right: 16px; }

    #inputArea {
      margin-top: 10px;
    }

    #guessInput {
      width: 280px;
      padding: 10px;
      font-size: 16px;
      border-radius: 4px;
      border: 1px solid #ccc;
      margin-right: 8px;
    }

    #guessButton {
      padding: 10px 20px;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }

    #resetButton {
      margin-top: 16px;
      padding: 10px 20px;
      background: #2196f3;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }

    #resetButton:disabled {
      opacity: 0.5;
      cursor: default;
    }

    #clueBox {
      margin-top: 10px;
      font-size: 18px;
    }

    #score {
      margin-top: 10px;
      font-size: 20px;
    }

    #points {
      margin-top: 6px;
      font-size: 18px;
      color: #ffffff;
    }

    #cityList {
      margin-top: 10px;
      font-size: 16px;
      color: #ddd;
    }

    #targetAreaInfo {
      margin-top: 8px;
      font-size: 16px;
      color: #a3d3ff;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: red;
      border-radius: 50%;
      position: absolute;
    }
  </style>
</head>

<body>

<h1>🌍 Capitle</h1>
<p id="instructions">Type the capital name to guess the city.</p>

<div id="map">
  <span class="quadLabel nw">NW</span>
  <span class="quadLabel ne">NE</span>
  <span class="quadLabel sw">SW</span>
  <span class="quadLabel se">SE</span>
</div>
<div id="clueBox">Loading clue...</div>
<div id="inputArea">
  <input id="guessInput" type="text" placeholder="Type a capital name" autocomplete="off" list="capitals" />
  <button id="guessButton">Submit Guess</button>
  <datalist id="capitals"></datalist>
</div>
<div id="cityList"></div>
<div id="targetAreaInfo"></div>
<div id="score"></div>
<div id="points"></div>
<button id="giveUpButton">Give Up</button>
<button id="resetButton">Play Again</button>

function getQuadrant(city) {
  if (city.lat >= 0 && city.lng < 0) return "Northwest";
  if (city.lat >= 0 && city.lng >= 0) return "Northeast";
  if (city.lat < 0 && city.lng < 0) return "Southwest";
  return "Southeast";
}

function haversineDistance(lat1, lon1, lat2, lon2) {
  const toRad = angle => angle * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return 6371 * c;
}

function getWarmthHint(currentDistance, previousDistance) {
  if (previousDistance === null) return "Make your first guess to get a warmer/colder hint.";
  if (currentDistance < previousDistance) return "Warmer";
  if (currentDistance > previousDistance) return "Colder";
  return "Same distance";
}

function getBorderCountryHint(city) {
  let nearestCountry = null;
  let nearestDistance = Infinity;
  for (const other of cities) {
    if (other.country === city.country) continue;
    const dist = haversineDistance(city.lat, city.lng, other.lat, other.lng);
    if (dist < nearestDistance) {
      nearestDistance = dist;
      nearestCountry = other.country;
    }
  }
  if (!nearestCountry) return "This country has no nearby location hint.";
  
  const isIsland = islandCountries.has(city.country);
  return isIsland 
    ? `This capital's country is right next to ${nearestCountry}.`
    : `This capital's country borders ${nearestCountry}.`;
}

function getClueForGuess(guessCount, currentDistance) {
  if (guessCount === 1) {
    const hemisphere = target.lat >= 0 ? "Northern" : "Southern";
    return `Good guess! Here's your first hint: the capital is in the ${hemisphere} Hemisphere.`;
  }

  if (guessCount === 2) {
    const quadrant = getQuadrant(target);
    return `Look sharp: the hidden capital sits in the ${quadrant} quadrant.`;
  }

  if (guessCount === 3) {
    return "A broad circle now appears to show the general target area.";
  }

  if (guessCount === 4) {
    return "A tighter ring is active — guess inside it for a much hotter result.";
  }

  if (guessCount === 5) {
    const warmth = getWarmthHint(currentDistance, previousDistance);
    return `Hot/cold check: ${warmth}. Keep tracking the red ring.`;
  }

  if (guessCount === 6) {
    return getBorderCountryHint(target);
  }

  if (guessCount === 7) {
    return `Country clue: this capital is the seat of ${target.country}.`;
  }

  return `Still searching? Keep using the map, the circle hints, and the country clue.`;
}

function getAreaHintText(guessCount, currentDistance) {
  if (guessCount === 1) {
    const hemisphere = target.lat >= 0 ? "Northern" : "Southern";
    return `The capital is in the ${hemisphere} Hemisphere. Use this to focus your next guess.`;
  }

  if (guessCount === 2) {
    return "A quadrant clue is active. Stay on the correct half of the world.";
  }

  if (guessCount === 3) {
    return "That large circle shows the rough region where the capital hides.";
  }

  if (guessCount === 4) {
    return "The smaller circle is now your hot zone. Get your next guess inside it.";
  }

  if (guessCount === 5) {
    return currentDistance < smallCircleRadiusKm
      ? "You're very close — the capital is just inside the red ring."
      : "You’re getting warmer. Keep chasing the red ring.";
  }

  if (guessCount === 6) {
    return "Hot/cold check: check whether your latest guess was hotter or colder than the previous one.";
  }

  if (guessCount === 7) {
    return "This country clue should help you narrow down the capital dramatically.";
  }

  return "The hunt continues. Use the clues you’ve unlocked to find the right capital.";
}

  const coords = quadrantBounds[quadrant];

function submitGuess() {
  if (guessed) return;
  const guessName = guessInput.value.trim();
  if (!guessName) {
    clueBox.innerText = "Please type a capital name before submitting.";
    return;
  }

  const guessCity = findCapitalByName(guessName);
  if (!guessCity) {
    clueBox.innerText = `Unknown capital: "${guessName}". Try another capital name.`;
    return;
  }

  guessInput.value = "";
  guessCount += 1;
  addGuessMarker(guessCity.lat, guessCity.lng);
  const currentDistance = haversineDistance(
    guessCity.lat,
    guessCity.lng,
    target.lat,
    target.lng
  );

  if (currentDistance <= 200) {
    finishGame(currentDistance);
    return;
  }

  const clueText = getClueForGuess(guessCount, currentDistance);
  const areaText = getAreaHintText(guessCount, currentDistance);

  clueBox.innerHTML = clueText;
  targetAreaInfo.innerText = areaText;

  if (guessCount === 2) {
    highlightQuadrant(getQuadrant(target));
  }

  if (guessCount === 3) {
    showTargetHintCircles(false);
  } else if (guessCount === 4) {
    showTargetHintCircles(true);
  } else if (guessCount >= 5) {
    showTargetHintCircles(currentDistance < smallCircleRadiusKm);
  }

  previousDistance = currentDistance;
  scoreBox.innerText = "Guesses: " + guessCount;
}

function normalizeText(text) {
  return text
    .toLowerCase()
    .normalize("NFD")
    .replace(/\p{Diacritic}/gu, "")
    .replace(/[^a-z0-9 ]+/g, "")
    .trim();
}

function levenshteinDistance(a, b) {
  const matrix = [];
  for (let i = 0; i <= b.length; i++) {
    matrix[i] = [i];
  }
  for (let j = 0; j <= a.length; j++) {
    matrix[0][j] = j;
  }
  for (let i = 1; i <= b.length; i++) {
    for (let j = 1; j <= a.length; j++) {
      if (b.charAt(i - 1) === a.charAt(j - 1)) {
        matrix[i][j] = matrix[i - 1][j - 1];
      } else {
        matrix[i][j] = Math.min(
          matrix[i - 1][j - 1] + 1,
          matrix[i][j - 1] + 1,
          matrix[i - 1][j] + 1
        );
      }
    }
  }
  return matrix[b.length][a.length];
}

function findCapitalByName(input) {
  const normalizedInput = normalizeText(input);
  if (!normalizedInput) return null;

  const exactMatch = cities.find(
    (city) => normalizeText(city.name) === normalizedInput
  );
  if (exactMatch) return exactMatch;

  const startsMatch = cities.filter(
    (city) => normalizeText(city.name).startsWith(normalizedInput)
  );
  if (startsMatch.length === 1) return startsMatch[0];

  const includesMatch = cities.filter(
    (city) => normalizeText(city.name).includes(normalizedInput)
  );
  if (includesMatch.length === 1) return includesMatch[0];

  // Fuzzy matching: find best match by similarity
  let bestMatch = null;
  let bestDistance = Infinity;
  const maxDistance = Math.max(3, Math.ceil(normalizedInput.length * 0.4));
  
  for (const city of cities) {
    const distance = levenshteinDistance(normalizedInput, normalizeText(city.name));
    if (distance < bestDistance && distance <= maxDistance) {
      bestDistance = distance;
      bestMatch = city;
    }
  }
  
  return bestMatch;
}

function finishGame(distanceKm) {
  guessed = true;
  guessInput.disabled = true;
  guessButton.disabled = true;
  giveUpButton.disabled = true;
  
  let score = 0;
  
  // Accuracy tier (base score)
  let accuracyScore = 0;
  if (distanceKm < 50) {
    accuracyScore = 2000;
  } else if (distanceKm < 100) {
    accuracyScore = 1500;
  } else if (distanceKm < 200) {
    accuracyScore = 1200;
  } else if (distanceKm < smallCircleRadiusKm) {
    accuracyScore = 800;
  } else if (distanceKm < bigCircleRadiusKm) {
    accuracyScore = 400;
  } else {
    accuracyScore = 200;
  }
  
  // Efficiency multiplier (fewer guesses = bigger multiplier)
  let efficiencyMultiplier = 1;
  if (guessCount === 1) {
    efficiencyMultiplier = 2.0;
  } else if (guessCount === 2) {
    efficiencyMultiplier = 1.6;
  } else if (guessCount === 3) {
    efficiencyMultiplier = 1.3;
  } else if (guessCount === 4) {
    efficiencyMultiplier = 1.1;
  } else {
    efficiencyMultiplier = 1.0;
  }
  
  score = Math.round(accuracyScore * efficiencyMultiplier);
  
  // Extra bonus for very fast perfect guesses
  if (guessCount === 1 && distanceKm < 50) {
    score += 500;
  }
  
  score = Math.max(100, score);
  totalPoints += score;
  clueBox.innerText = "Correct capital was: " + target.name + "!";
  scoreBox.innerText = "Round points: " + score + " | Guesses: " + guessCount;
  pointsBox.innerText = "Total points: " + totalPoints;
  resetButton.disabled = false;
  if (mapType === "google") {
    targetMarker = new google.maps.Marker({
      position: { lat: target.lat, lng: target.lng },
      map,
      icon: {
        path: google.maps.SymbolPath.BACKWARD_CLOSED_ARROW,
        scale: 6,
        fillColor: "lime",
        fillOpacity: 1,
        strokeWeight: 2,
        strokeColor: "black"
      }
    });
    map.panTo({ lat: target.lat, lng: target.lng });
    return;
  }
  targetMarker = L.marker([target.lat, target.lng], {
    icon: L.icon({
      iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41]
    })
  }).addTo(map);
  map.panTo([target.lat, target.lng]);
}

function findNearestCapital(lat, lng) {
  let nearest = null;
  let minDistance = Infinity;
  for (const city of cities) {
    const dist = haversineDistance(lat, lng, city.lat, city.lng);
    if (dist < minDistance) {
      minDistance = dist;
      nearest = city;
    }
  }
  return nearest;
}

function handleMapClick(event) {
  if (guessed) return;
  const latlng = mapType === "google" ? event.latLng.toJSON() : event.latlng;
  const nearestCapital = findNearestCapital(latlng.lat, latlng.lng);
  if (!nearestCapital) return;
  
  guessInput.value = nearestCapital.name;
  submitGuess();
}

function initGoogleMap() {
  mapType = "google";
  googleMapInitialized = true;
  map = new google.maps.Map(mapEl, {
    center: { lat: 20, lng: 0 },
    zoom: 2,
    minZoom: 2,
    mapTypeId: "roadmap"
  });
  google.maps.event.addListener(map, "click", handleMapClick);
  resetGame();
}

function initLeafletMap() {
  mapType = "leaflet";
  if (map) {
    map.remove();
    map = null;
  }
  map = L.map(mapEl, { minZoom: 2 }).setView([20, 0], 2);
  L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}", {
    attribution: "Tiles © Esri — Source: Esri, Garmin, USGS, FAO, NPS, NRCAN, GeoBase, Kadaster NL, Ordnance Survey, Esri Japan, METI, Esri China (Hong Kong), OpenStreetMap contributors, and the GIS User Community",
    maxZoom: 19
  }).addTo(map);
  map.on("click", handleMapClick);
  resetGame();
}

function loadLeafletFallback() {
  if (mapType === "leaflet") return;
  if (window.L) {
    initLeafletMap();
    return;
  }
  const link = document.createElement("link");
  link.rel = "stylesheet";
  link.href = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.css";
  document.head.appendChild(link);
  const script = document.createElement("script");
  script.src = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
  script.onload = initLeafletMap;
  script.onerror = function() {
    clueBox.innerText = "Leaflet fallback failed. Reload the page with internet access.";
    resetButton.disabled = true;
  };
  document.body.appendChild(script);
}

window.initMap = initGoogleMap;
window.gm_authFailure = function() {
  clueBox.innerText = "Google Maps authentication failed. Using OpenStreetMap fallback.";
  loadLeafletFallback();
};

function reportMapError() {
  clueBox.innerText = "Google Maps failed to load. Using OpenStreetMap fallback.";
  loadLeafletFallback();
}

const googleApiKey = "YOUR_API_KEY";
if (!googleApiKey || googleApiKey === "YOUR_API_KEY") {
  clueBox.innerText = "Google Maps API key missing. Using OpenStreetMap fallback.";
  loadLeafletFallback();
} else {
  const googleScript = document.createElement("script");
  googleScript.async = true;
  googleScript.defer = true;
  googleScript.src = `https://maps.googleapis.com/maps/api/js?key=${googleApiKey}&language=en&region=US&callback=initMap`;
  googleScript.onerror = reportMapError;
  document.body.appendChild(googleScript);
}

setTimeout(() => {
  if (!googleMapInitialized && mapType !== "leaflet") {
    clueBox.innerText = "Google Maps did not initialize. Using OpenStreetMap fallback.";
    loadLeafletFallback();
  }
}, 5000);
</script>
